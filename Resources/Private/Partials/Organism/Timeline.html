<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:comment>
    Timeline organism — ordered list with time/article semantics per entry.
    Arguments: items (tx_maitimeline_item, each with `images` FAL
    array processed via FilesProcessor), data (parent tt_content)
</f:comment>
<section class="mai-timeline"
         data-ce-uid="{data.uid}"
         aria-label="{f:if(condition: data.header, then: data.header, else: 'Timeline')}">
    <f:if condition="{data.header}">
        <f:render partial="Atom/Heading" arguments="{level: 2, text: data.header, class: 'mai-timeline__title'}"/>
    </f:if>
    <ol class="mai-timeline__list">
        <f:for each="{items}" as="item" iteration="it">
            <f:render partial="Items/TimelineItem"
                      arguments="{item: item, index: it.cycle, total: it.total, parentUid: data.uid}"/>
        </f:for>
    </ol>
</section>
</html>
