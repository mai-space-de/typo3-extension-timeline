<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Default" />

<f:section name="main">
    <div class="tx-timeline">
        <article class="timeline-entry timeline-entry--detail">
            <header class="timeline-entry__header">
                <span class="timeline-entry__year">{timelineEntry.year}</span>
                <h1 class="timeline-entry__title">{timelineEntry.title}</h1>
                <f:if condition="{timelineEntry.categories -> f:count()} > 0">
                    <div class="timeline-entry__categories">
                        <f:for each="{timelineEntry.categories}" as="category">
                            <span class="timeline-entry__category">{category.title}</span>
                        </f:for>
                    </div>
                </f:if>
            </header>

            <f:if condition="{timelineEntry.media -> f:count()} > 0">
                <div class="timeline-entry__media">
                    <f:for each="{timelineEntry.media}" as="mediaItem">
                        <figure class="timeline-entry__figure">
                            <f:image image="{mediaItem}" alt="{mediaItem.alternative}" class="timeline-entry__image" />
                            <f:if condition="{mediaItem.description}">
                                <figcaption class="timeline-entry__caption">{mediaItem.description}</figcaption>
                            </f:if>
                        </figure>
                    </f:for>
                </div>
            </f:if>

            <f:if condition="{timelineEntry.description}">
                <div class="timeline-entry__description">
                    <f:format.html>{timelineEntry.description}</f:format.html>
                </div>
            </f:if>

            <footer class="timeline-entry__footer">
                <f:link.action action="index" class="timeline-entry__back">
                    <f:translate key="LLL:EXT:timeline/Resources/Private/Language/locallang.xlf:timeline.back" />
                </f:link.action>
            </footer>
        </article>
    </div>
</f:section>
</html>
