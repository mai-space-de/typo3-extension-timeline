<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      data-namespace-typo3-fluid="true">
<f:layout name="Default" />

<f:section name="main">
    <div class="tx-timeline">
        <f:if condition="{entries -> f:count()} > 0">
            <f:then>
                <ul class="timeline timeline--compact">
                    <f:for each="{entries}" as="entry">
                        <li class="timeline__item">
                            <span class="timeline__year">{entry.year}</span>
                            <span class="timeline__separator">–</span>
                            <f:link.action action="show" arguments="{timelineEntry: entry}" class="timeline__title-link">
                                <span class="timeline__title">{entry.title}</span>
                            </f:link.action>
                            <f:if condition="{entry.categories -> f:count()} > 0">
                                <span class="timeline__categories">
                                    <f:for each="{entry.categories}" as="category" iteration="iter">
                                        <span class="timeline__category">{category.title}<f:if condition="{iter.isLast} == false">, </f:if></span>
                                    </f:for>
                                </span>
                            </f:if>
                        </li>
                    </f:for>
                </ul>
            </f:then>
            <f:else>
                <p class="timeline__empty">
                    <f:translate key="LLL:EXT:timeline/Resources/Private/Language/locallang.xlf:timeline.noentries" />
                </p>
            </f:else>
        </f:if>
    </div>
</f:section>
</html>
